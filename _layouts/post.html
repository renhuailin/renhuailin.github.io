        {% include sidebar.html %}

        <script type="text/javascript">

        $('#main_content').toc({
            displayBox:"navmain",
            showAlways:true,
            showText:'展開',
            contentsText: "目錄",
            hideText:"隱藏",
            saveShowStatus:false
        });

        /*
         * 懒人建站 http://www.51xuediannao.com/
         * 仿百度百科右侧导航代码 - 页面目录结构导航 v0.01
         * 只写了两级，无限级别也可以，是逻辑上的级别，html结构全是同一级别
         * 滑标动画用的css3过渡动画，不支持的浏览器就没动画效果了
         * 和百度百科比起来还是比较弱，没有实现右边也可以滚动的功能
         */
        function DirectoryNav($h, config) {
            this.opts = $.extend(true, {
                scrollThreshold: 0.5, //滚动检测阀值 0.5在浏览器窗口中间部位
                scrollSpeed: 700, //滚动到指定位置的动画时间
                scrollTopBorder: 500, //滚动条距离顶部多少的时候显示导航，如果为0，则一直显示
                easing: 'swing', //不解释
                delayDetection: 50, //延时检测，避免滚动的时候检测过于频繁
                scrollChange: function() {}
            }, config);
            this.$win = $(window);
            this.$h = $h;
            this.$pageNavList = "";
            this.$pageNavListLis = "";
            this.$curTag = "";
            this.$pageNavListLiH = "";
            this.offArr = [];
            this.curIndex = 0;
            this.scrollIng = false;
            this.init();
            this.$goUpButton = "";
            this.$goDownButton = "";
            this.$tocContainer;
            this.$oldCurLi;
        }

        DirectoryNav.prototype = {
            init: function() {
                this.make();
                this.setArr();
                this.bindEvent();
            },
            make: function() {

                $directoryNav = $("#tocNavigator")

                //设置变量
                this.$pageNavList = $directoryNav;
                this.$pageNavListLis = this.$pageNavList.find("li");
                this.$curTag = this.$pageNavList.find(".cur-tag");
                this.$pageNavListLiH = this.$pageNavListLis.eq(0).height();
                this.$goUpButton = $("#tocNavigator a.go-up");
                this.$goDownButton = $("#tocNavigator a.go-down");

                this.$tocContainer = $("#toc-container");

                // $("#toc-container").scroll(function() {
                //     HandlingScrollingStuff();
                // });

                if (!this.opts.scrollTopBorder) {
                    this.$pageNavList.show();
                }
            },
            setArr: function() {
                var This = this;
                var i = 0;
                this.$h.each(function() {
                    var $this = $(this);
                    var offT = Math.round($this.offset().top);
                    var info = {"index":i,"top":offT,"bottom":0};
                    This.offArr.push(info);
                    if(i > 0) {
                        This.offArr[i - 1].bottom = offT;
                    }
                    i++;
                });
                This.offArr[--i].bottom = $(document).height();
            },
            posTag: function(top) {
                this.$curTag.css({
                    top: top + 'px'
                });
            },

            ifPos: function(st) {
                var offArr = this.offArr;
                //console.log(st);

                this.$pageNavListLis = this.$pageNavList.find("li");

                var windowHeight = Math.round(this.$win.height() * this.opts.scrollThreshold);

                var $curLi;
                var indexNearTop;
                var indexNearMiddle;
                for (var i = 0; i < offArr.length; i++) {

                    if(offArr[i].top <= (st)  && (st) < offArr[i].bottom) {
                        indexNearMiddle = offArr[i].index;
                        break;
                    }
                }

                if (this.$oldCurLi != indexNearMiddle) {
                    $curLi = this.$pageNavListLis.eq(indexNearMiddle);

                    var tagTop = $curLi.position().top;

                    var newTop = $("#toc-container").scrollTop() + tagTop -  $("#toc-container").eq(0).height() / 2;

                    if (newTop < 0) {
                        newTop = 0;
                    }

                    $("#toc-container").scrollTop(newTop);

                    this.opts.scrollChange.call(this);

                    this.$pageNavList.find("span.cur-tag").removeClass("cur-tag").addClass("c-dot");
                    this.$pageNavList.find("li").removeClass("cur");
                    $curLi.addClass("cur");
                    $curLi.find("span.c-dot").removeClass("c-dot").addClass("cur-tag");
                    this.$oldCurLi = indexNearMiddle;
                }

            },
            bindEvent: function() {
                var This = this,
                    show = false,
                    timer = 0;

                this.$pageNavList.on("mouseout",function () {
                    $("div.right-wrap").hide();
                });

                this.$pageNavList.on("mouseover",function () {
                    $("div.right-wrap").show();
                });

                this.$goUpButton.on("click",function () {
                    var $this = $(this);
                    if($this.hasClass("disable")) {
                        return;
                    }

                    var newTop = $("#toc-container").scrollTop() - 40;
                    if(newTop > 0) {
                        $("#toc-container").scrollTop(newTop);
                    } else {
                        $("#toc-container").scrollTop(0);
                    }
                });

                this.$goDownButton.on("click",function () {
                    var newTop = $("#toc-container").scrollTop() + 40;
                    if(newTop > 0) {
                        $("#toc-container").scrollTop(newTop);
                    }
                });

                $("a.toggle-button").on("click",function () {
                    if ($("#tocNavigator").hasClass("collapse")) {
                        $("#tocNavigator").removeClass("collapse");
                    } else {
                        $("#tocNavigator").addClass("collapse");
                    }
                    $("#tocNavigator #navmain").toggle();
                })

                $("a.gotop-button").on("click",function () {
                    $('html, body').animate({ scrollTop: 0 }, 'fast');
                })

                this.$goDownButton = $("#tocNavigator a.go-down");

                $("#toc-container").on("scroll",function (data,event) {
                    var $this = $(this);
                    $goUpButton = $("#tocNavigator a.go-up");
                    $goDownButton = $("#tocNavigator a.go-down");

                    var newTop = $this.scrollTop();
                    if(newTop > 0) {
                        $goUpButton.removeClass("disable");
                        $goUpButton.prop('disabled',false);
                    } else {
                        $goUpButton.addClass("disable");
                        $goUpButton.prop('disabled',true);
                    }

                    if ($(this).scrollTop() + $(this).innerHeight() >= $(this)[0].scrollHeight){
                        $goDownButton.addClass("disable");
                        $goDownButton.prop('disabled',true);
                    } else {
                        $goDownButton.removeClass("disable");
                        $goDownButton.prop('disabled',false);
                    }

                });


                this.$win.on("scroll", function(event) {
                    // console.log(event);

                    var $this = $(this);
                    clearTimeout(timer);
                    timer = setTimeout(function() {
                        This.scrollIng = true;
                        if ($this.scrollTop() > This.opts.scrollTopBorder) {
                            if (!This.$pageNavListLiH) {
                                This.$pageNavListLiH = This.$pageNavListLis.eq(0).height();
                            }

                            if (!show) {
                                This.$pageNavList.fadeIn();
                                show = true;
                            }

                            This.ifPos($(this).scrollTop());
                        } else {
                            if (show) {
                                This.$pageNavList.fadeOut();
                                show = false;
                            }
                        }

                        //This.$goUpButton.eq(0).prop('disabled', This.$tocContainer.scrollTop() < This.$tocContainer.eq(0).height());

                    }, This.opts.delayDetection);
                });

                this.$pageNavList.on("click", "li", function() {
                    var $this = $(this);
                    var index = $this.index();
                    // This.scrollTo(This.offArr[index]);
                })
            },
            scrollTo: function(offset, callback) {
                var This = this;
                $('html,body').animate({
                    scrollTop: offset
                }, this.opts.scrollSpeed, this.opts.easing, function() {
                    This.scrollIng = false;
                    //修正弹两次回调 蛋疼
                    callback && this.tagName.toLowerCase() == 'body' && callback();
                });
            }
        };

        //实例化
        var directoryNav = new DirectoryNav($("h1,h2"), {
            scrollTopBorder: 650 //滚动条距离顶部多少的时候显示导航，如果为0，则一直显示
        });
        </script>
